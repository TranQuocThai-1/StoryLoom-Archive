spring.application.name=archive

# 1. Database Connection Details
spring.datasource.url=jdbc:postgresql://localhost:5432/storyloom
spring.datasource.username=storyloom_admin
spring.datasource.password=secretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Hibernate/JPA Settings
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 'create' forces PostgreSQL to drop old tables and build empty ones
spring.jpa.hibernate.ddl-auto=update

# 3. Mustache Template Settings
spring.mustache.null-value=

# 4. MinIO Cloud Storage Configuration
minio.url=http://127.0.0.1:9000
minio.access.key=storyloom_admin
minio.secret.key=secretpassword
minio.bucket.name=storyloom-archive

# 5. File Upload Limits
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Automatically log users out after 30 minutes of inactivity
server.servlet.session.timeout=30m

server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:storyloom-keystore.p12
server.ssl.key-store-password=storyloom
server.ssl.key-store-type=pkcs12
server.ssl.key-alias=storyloom