version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: storyloom-db
    environment:
      - POSTGRES_DB=storyloom
      - POSTGRES_USER=storyloom_admin
      - POSTGRES_PASSWORD=secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: storyloom-storage
  
    volumes:
      - C:/StoryLoom_Storage:/data
    ports:
      - "9000:9000"
      - "9001:9001" 
    environment:
      MINIO_ROOT_USER: storyloom_admin
      MINIO_ROOT_PASSWORD: secretpassword
    command: server /data --console-address ":9001"

volumes:
  postgres_data: